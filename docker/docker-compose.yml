services:

  qdrant:
    image: qdrant/qdrant:v1.13.6
    platform: linux/arm64/v8
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10

  genesis-ai:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      # Override localhost → docker service name
      - QDRANT_HOST=qdrant
      - QDRANT_GRPC_PORT=6334
    volumes:
      # Mount knowledge base and agent config so they can be updated without rebuilding
      - ../knowledge:/app/knowledge:ro
      - ../agents:/app/agents:ro
      - genesis_data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
  genesis_data:
