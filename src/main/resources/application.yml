spring:
  application:
    name: genesis-ai
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
  datasource:
    url: jdbc:h2:file:./data/genesis;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-opus-4-5
          max-tokens: 8000
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

genesis:
  api-key: ${GENESIS_API_KEY:dev-key-change-in-prod}

qdrant:
  rest:
    url: ${QDRANT_REST_URL:http://localhost:6333}
    api-key: ${QDRANT_API_KEY:}
