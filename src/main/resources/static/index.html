<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis AI</title>
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #fff; display: flex; height: 100vh; overflow: hidden; color: #1a1a1a; }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; min-width: 260px; background: #111; display: flex;
    flex-direction: column; border-right: 1px solid #222;
  }
  #sidebar-header {
    padding: 20px 16px 12px; border-bottom: 1px solid #222;
  }
  #sidebar-header h1 { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  #sidebar-header p  { color: #666; font-size: 11px; margin-top: 2px; }

  #new-chat-btn {
    margin: 12px; padding: 10px 14px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; color: #fff; font-size: 13px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s;
  }
  #new-chat-btn:hover { background: #222; }
  #new-chat-btn svg { opacity: 0.7; }

  #conversations { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
  #conversations::-webkit-scrollbar { width: 4px; }
  #conversations::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .conv-item {
    padding: 9px 10px; border-radius: 7px; cursor: pointer; margin-bottom: 2px;
    display: flex; align-items: center; justify-content: space-between;
    group position: relative;
  }
  .conv-item:hover { background: #1c1c1c; }
  .conv-item.active { background: #222; }
  .conv-name { color: #ccc; font-size: 13px; white-space: nowrap; overflow: hidden;
               text-overflow: ellipsis; flex: 1; }
  .conv-item.active .conv-name { color: #fff; }
  .conv-delete {
    opacity: 0; background: none; border: none; color: #666; cursor: pointer;
    padding: 2px 4px; border-radius: 4px; font-size: 14px; line-height: 1;
    transition: opacity 0.15s, color 0.15s; flex-shrink: 0;
  }
  .conv-item:hover .conv-delete { opacity: 1; }
  .conv-delete:hover { color: #ff6b6b; }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  #chat-header {
    padding: 16px 24px; border-bottom: 1px solid #f0f0f0;
    display: flex; align-items: center; gap: 12px;
  }
  #chat-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  #clear-btn {
    margin-left: auto; background: none; border: 1px solid #e5e5e5; color: #888;
    font-size: 12px; padding: 5px 10px; border-radius: 6px; cursor: pointer;
    transition: all 0.15s;
  }
  #clear-btn:hover { border-color: #ccc; color: #555; }

  #messages {
    flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 3px; }

  .msg { display: flex; gap: 12px; max-width: 820px; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }

  .avatar {
    width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
  }
  .msg.ai   .avatar { background: #1a1a1a; color: #fff; }
  .msg.user .avatar { background: #f0f0f0; color: #666; }

  .bubble {
    padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6;
    max-width: calc(100% - 44px);
  }
  .msg.ai   .bubble { background: #fafafa; border: 1px solid #f0f0f0; color: #1a1a1a; }
  .msg.user .bubble { background: #1a1a1a; color: #fff; }

  /* markdown inside bubble */
  .bubble h1,.bubble h2,.bubble h3 { margin: 12px 0 6px; font-size: 15px; }
  .bubble h1:first-child,.bubble h2:first-child,.bubble h3:first-child { margin-top: 0; }
  .bubble p  { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul,.bubble ol { padding-left: 20px; margin-bottom: 8px; }
  .bubble li { margin-bottom: 3px; }
  .bubble strong { font-weight: 600; }
  .bubble em { font-style: italic; }
  .bubble code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; font-size: 13px; }
  .bubble pre  { background: rgba(0,0,0,0.06); padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble hr { border: none; border-top: 1px solid #e5e5e5; margin: 10px 0; }
  .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .bubble th,.bubble td { border: 1px solid #e5e5e5; padding: 6px 10px; text-align: left; }
  .bubble th { background: #f5f5f5; font-weight: 600; }

  .msg.user .bubble code { background: rgba(255,255,255,0.15); }
  .msg.user .bubble hr   { border-color: rgba(255,255,255,0.2); }

  .typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; background: #999; border-radius: 50%;
                 animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-5px); } }

  /* ── Empty state ── */
  #empty {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; color: #aaa;
  }
  #empty svg { opacity: 0.3; }
  #empty h2  { font-size: 18px; font-weight: 600; color: #555; }
  #empty p   { font-size: 14px; text-align: center; max-width: 340px; line-height: 1.5; }

  /* ── Input ── */
  #input-area {
    padding: 16px 24px 20px; border-top: 1px solid #f0f0f0;
  }
  #input-wrap {
    display: flex; align-items: flex-end; gap: 10px; background: #fafafa;
    border: 1px solid #e5e5e5; border-radius: 12px; padding: 10px 12px;
    transition: border-color 0.15s;
  }
  #input-wrap:focus-within { border-color: #1a1a1a; background: #fff; }
  #msg-input {
    flex: 1; border: none; background: none; font-size: 14px; line-height: 1.5;
    resize: none; outline: none; font-family: inherit; color: #1a1a1a;
    max-height: 160px; overflow-y: auto;
  }
  #msg-input::placeholder { color: #bbb; }
  #send-btn {
    width: 32px; height: 32px; background: #1a1a1a; border: none; border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s; align-self: flex-end;
  }
  #send-btn:hover:not(:disabled) { background: #333; }
  #send-btn:disabled { background: #e5e5e5; cursor: not-allowed; }

  .hint { text-align: center; font-size: 11px; color: #ccc; margin-top: 8px; }

  /* ── Attachment ── */
  #attach-btn {
    width: 32px; height: 32px; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    color: #bbb; border-radius: 8px; transition: color 0.15s, background 0.15s;
    align-self: flex-end;
  }
  #attach-btn:hover { color: #666; background: #f0f0f0; }
  #attach-btn.has-file { color: #1a1a1a; }
  #attachment-bar {
    display: none; align-items: center; gap: 8px; padding: 6px 12px 0;
    font-size: 12px; color: #555;
  }
  #attachment-bar.visible { display: flex; }
  #attachment-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #remove-attach {
    background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px;
    padding: 0 2px; line-height: 1; transition: color 0.15s;
  }
  #remove-attach:hover { color: #ff6b6b; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Genesis AI</h1>
    <p>Brand Intelligence</p>
  </div>
  <button id="new-chat-btn" onclick="newChat()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    New conversation
  </button>
  <div id="conversations"></div>
</div>

<div id="main">
  <div id="chat-header" style="display:none">
    <div id="chat-title"></div>
    <button id="clear-btn" onclick="clearHistory()">Clear history</button>
  </div>

  <div id="empty">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <rect x="4" y="8" width="40" height="30" rx="6" stroke="#999" stroke-width="2"/>
      <path d="M16 40l4-4h12" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 20h20M14 26h14" stroke="#999" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h2>Start a conversation</h2>
    <p>Ask Genesis AI anything about brand strategy, marketing, purpose-led business, or your specific brand.</p>
  </div>

  <div id="messages" style="display:none"></div>

  <div id="input-area">
    <div id="attachment-bar">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
      </svg>
      <span id="attachment-name"></span>
      <button id="remove-attach" onclick="removeAttachment()" title="Remove attachment">✕</button>
    </div>
    <div id="input-wrap">
      <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach file (PDF or text)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" style="display:none" onchange="onFileSelected(event)">
      <textarea id="msg-input" rows="1" placeholder="Ask Genesis AI anything… paste a URL to read it"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M13 1L1 5.5l5 2.5 2.5 5L13 1z" fill="white"/>
        </svg>
      </button>
    </div>
    <div class="hint">Genesis AI · paste a URL to read it · attach a PDF or text file for context</div>
  </div>
</div>

<script>
const API = '';
const KEY = 'genesis-ai-key';
const HEADERS = { 'Content-Type': 'application/json', 'X-Api-Key': KEY };

let currentBrandId  = null;
let isStreaming     = false;
let pendingFile     = null;

marked.use({ breaks: true, gfm: true });

// ── Boot ──────────────────────────────────────────────
async function boot() {
  await loadConversations();
  document.getElementById('msg-input').addEventListener('input', () => {
    document.getElementById('send-btn').disabled =
      document.getElementById('msg-input').value.trim() === '' || isStreaming;
  });
}

// ── Conversations ─────────────────────────────────────
async function loadConversations() {
  const brands = await fetch(`${API}/api/brands`, { headers: HEADERS }).then(r => r.json()).catch(() => []);
  brands.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  const el = document.getElementById('conversations');
  el.innerHTML = '';
  for (const b of brands) {
    const div = document.createElement('div');
    div.className = 'conv-item' + (b.id === currentBrandId ? ' active' : '');
    div.dataset.id = b.id;
    div.innerHTML = `
      <span class="conv-name">${esc(b.name)}</span>
      <button class="conv-delete" onclick="deleteConv(event,'${b.id}')" title="Delete">✕</button>`;
    div.addEventListener('click', () => openConversation(b.id, b.name));
    el.appendChild(div);
  }
}

async function newChat() {
  currentBrandId = null;
  document.getElementById('messages').innerHTML = '';
  document.getElementById('messages').style.display = 'none';
  document.getElementById('empty').style.display = 'flex';
  document.getElementById('chat-header').style.display = 'none';
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  document.getElementById('msg-input').focus();
}

async function openConversation(id, name) {
  currentBrandId = id;
  document.getElementById('chat-title').textContent = name;
  document.getElementById('chat-header').style.display = 'flex';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('messages').style.display = 'flex';
  document.querySelectorAll('.conv-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id));

  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';

  const history = await fetch(`${API}/api/brands/${id}/chat/history`, { headers: HEADERS })
    .then(r => r.json()).catch(() => []);

  for (const m of history) {
    appendMessage(m.role, m.content, false);
  }
  scrollToBottom();
}

async function deleteConv(e, id) {
  e.stopPropagation();
  await fetch(`${API}/api/brands/${id}`, { method: 'DELETE', headers: HEADERS });
  if (currentBrandId === id) newChat();
  await loadConversations();
}

async function clearHistory() {
  if (!currentBrandId) return;
  await fetch(`${API}/api/brands/${currentBrandId}/chat/history`, { method: 'DELETE', headers: HEADERS });
  document.getElementById('messages').innerHTML = '';
}

// ── Attachment ────────────────────────────────────────
function onFileSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  pendingFile = file;
  document.getElementById('attachment-name').textContent = file.name;
  document.getElementById('attachment-bar').classList.add('visible');
  document.getElementById('attach-btn').classList.add('has-file');
}

function removeAttachment() {
  pendingFile = null;
  document.getElementById('file-input').value = '';
  document.getElementById('attachment-bar').classList.remove('visible');
  document.getElementById('attach-btn').classList.remove('has-file');
}

// ── Messaging ─────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  autoResize(input);
  document.getElementById('send-btn').disabled = true;

  const file = pendingFile;
  removeAttachment();

  // Create brand on first message if needed
  if (!currentBrandId) {
    const name = text.split(' ').slice(0, 6).join(' ') + (text.split(' ').length > 6 ? '…' : '');
    const brand = await fetch(`${API}/api/brands`, {
      method: 'POST', headers: HEADERS,
      body: JSON.stringify({ name, industry: '', audience: '', brief: '' })
    }).then(r => r.json());
    currentBrandId = brand.id;
    document.getElementById('chat-title').textContent = name;
    document.getElementById('chat-header').style.display = 'flex';
    document.getElementById('empty').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
    await loadConversations();
    document.querySelectorAll('.conv-item').forEach(el =>
      el.classList.toggle('active', el.dataset.id === currentBrandId));
  }

  appendMessage('user', text, false);

  // Typing indicator
  const typingId = 'typing-' + Date.now();
  const msgs = document.getElementById('messages');
  const typingEl = document.createElement('div');
  typingEl.className = 'msg ai'; typingEl.id = typingId;
  typingEl.innerHTML = `
    <div class="avatar">G</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(typingEl);
  scrollToBottom();

  isStreaming = true;
  let fullText = '';

  try {
    const formData = new FormData();
    formData.append('message', text);
    if (file) formData.append('file', file);

    const chatHeaders = { 'X-Api-Key': KEY }; // no Content-Type — browser sets multipart boundary
    const response = await fetch(`${API}/api/brands/${currentBrandId}/chat`, {
      method: 'POST', headers: chatHeaders, body: formData
    });

    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    // Replace typing indicator with real bubble
    typingEl.remove();
    const aiEl = document.createElement('div');
    aiEl.className = 'msg ai';
    aiEl.innerHTML = `<div class="avatar">G</div><div class="bubble" id="streaming-bubble"></div>`;
    msgs.appendChild(aiEl);
    const bubble = document.getElementById('streaming-bubble');
    scrollToBottom();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      // Each SSE event: "data:TOKEN\n\n"
      // Split carefully: event boundary is \n\n, but tokens can contain \n
      let idx;
      while ((idx = buffer.indexOf('\n\n')) !== -1) {
        const event = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        // Collect all data: lines in this event and join with \n (SSE spec)
        const dataLines = event.split('\n').filter(l => l.startsWith('data:'));
        if (dataLines.length > 0) {
          const token = dataLines.map(l => l.slice(5)).join('\n');
          fullText += token;
          // Stream as plain text for live feel; markdown rendered on complete
          bubble.textContent = fullText;
          scrollToBottom();
        }
      }
    }
    // Final render: replace plain text with formatted markdown
    bubble.innerHTML = marked.parse(fullText);
    bubble.removeAttribute('id');

  } catch (err) {
    document.getElementById(typingId)?.remove();
    appendMessage('ai', 'Something went wrong. Please try again.', false);
  }

  isStreaming = false;
  document.getElementById('send-btn').disabled = document.getElementById('msg-input').value.trim() === '';
  await loadConversations();
}

function appendMessage(role, content, scroll = true) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
  const label = role === 'user' ? 'You' : 'G';
  const html  = role === 'user' ? esc(content).replace(/\n/g, '<br>') : marked.parse(content);
  div.innerHTML = `<div class="avatar">${label}</div><div class="bubble">${html}</div>`;
  msgs.appendChild(div);
  if (scroll) scrollToBottom();
}

// ── Helpers ───────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
           .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

boot();
</script>
</body>
</html>
